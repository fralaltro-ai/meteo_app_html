<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meteo App</title>
    <!-- Icone per mobile -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <meta name="theme-color" content="#007aff">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #333;
            --card-bg: #ffffff;
            --primary-color: #007aff;
            --border-color: #e1e4e8;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --secondary-text: #666;
            --error-bg: #ffe5e5;
            --error-color: #d32f2f;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --card-bg: #1e1e1e;
                --border-color: #333;
                --shadow: 0 4px 12px rgba(0,0,0,0.4);
                --secondary-text: #aaa;
                --error-bg: rgba(211, 47, 47, 0.2);
                --error-color: #ff5252;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Search Bar */
        .search-container {
            position: relative;
            display: flex;
            z-index: 100;
        }

        .search-input {
            flex: 1;
            padding: 14px 44px 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-text);
            pointer-events: none;
            font-size: 18px;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            margin-top: 8px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--border-color);
        }

        .search-result-item {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover, .search-result-item:active {
            background-color: rgba(0, 122, 255, 0.1);
        }

        .search-result-city {
            font-weight: 600;
            font-size: 16px;
        }

        .search-result-admin {
            font-size: 12px;
            color: var(--secondary-text);
            margin-top: 2px;
        }

        /* Loading Spinner */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .loader {
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Error Message */
        .error-message {
            display: none;
            color: var(--error-color);
            background-color: var(--error-bg);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            font-size: 14px;
            line-height: 1.4;
        }

        /* General Sections hidden by default */
        #contentArea {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        /* Current Weather */
        .current-weather {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .city-name {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 4px 0;
        }

        .date-info {
            font-size: 14px;
            color: var(--secondary-text);
            margin-bottom: 16px;
        }

        .weather-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .weather-icon-main {
            font-size: 80px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .temperature {
            font-size: 64px;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        .description {
            font-size: 20px;
            font-weight: 500;
            text-transform: capitalize;
            margin: 8px 0 20px 0;
        }

        .details {
            display: flex;
            justify-content: space-between;
            background-color: var(--bg-color);
            border-radius: 16px;
            padding: 16px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .detail-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-weight: 600;
            font-size: 15px;
        }

        .detail-label {
            color: var(--secondary-text);
            font-size: 12px;
            margin-top: 2px;
        }

        /* Hourly Forecast */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 8px 0 0 4px;
        }

        .hourly-forecast {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            gap: 12px;
        }

        .hourly-forecast::-webkit-scrollbar {
            display: none;
        }

        .hourly-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--card-bg);
            padding: 16px 12px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            min-width: 60px;
        }

        .hourly-time {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--secondary-text);
        }

        .hourly-icon {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .hourly-temp {
            font-size: 18px;
            font-weight: 700;
        }

        /* Daily Forecast */
        .daily-forecast {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 16px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .daily-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .daily-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .daily-day {
            flex: 1;
            font-size: 16px;
            font-weight: 500;
        }

        .daily-icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
        }

        .daily-icon {
            font-size: 24px;
        }

        .daily-temps {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
        }

        .temp-min {
            color: var(--secondary-text);
            font-weight: 500;
        }

        /* App Footer */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: var(--secondary-text);
            margin-top: auto;
        }

        .footer a {
            color: var(--primary-color);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Cerca una città..." autocomplete="off">
            <span class="search-icon">🔍</span>
            <div id="searchResults" class="search-results"></div>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader-container">
            <div class="loader"></div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message"></div>

        <!-- Content Area -->
        <div id="contentArea">
            <!-- Current Weather -->
            <div class="current-weather">
                <h1 id="cityName" class="city-name">--</h1>
                <div id="dateInfo" class="date-info">--</div>
                <div class="weather-main">
                    <div id="mainIcon" class="weather-icon-main">--</div>
                    <div id="currentTemp" class="temperature">--°</div>
                    <div id="weatherDesc" class="description">--</div>
                </div>
                <div class="details">
                    <div class="detail-item">
                        <div class="detail-icon">🌡️</div>
                        <div id="feelsLike" class="detail-value">--°</div>
                        <div class="detail-label">Percepita</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">💨</div>
                        <div id="windSpeed" class="detail-value">--</div>
                        <div class="detail-label">Vento</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">💧</div>
                        <div id="humidity" class="detail-value">--%</div>
                        <div class="detail-label">Umidità</div>
                    </div>
                </div>
            </div>

            <!-- Hourly Forecast -->
            <h2 class="section-title">Oggi</h2>
            <div id="hourlyForecast" class="hourly-forecast">
                <!-- Popolato da JS -->
            </div>

            <!-- Daily Forecast -->
            <h2 class="section-title">Prossimi 7 giorni</h2>
            <div id="dailyForecast" class="daily-forecast">
                <!-- Popolato da JS -->
            </div>
        </div>
    </div>

    <div class="footer">
        Dati forniti da <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a>
    </div>

    <script>
        // --- Configurazione e Utility ---
        const weatherCodes = {
            0: { desc: 'Sereno', icon: '☀️' },
            1: { desc: 'Prevalentemente sereno', icon: '🌤️' },
            2: { desc: 'Parzialmente nuvoloso', icon: '⛅' },
            3: { desc: 'Coperto', icon: '☁️' },
            45: { desc: 'Nebbia', icon: '🌫️' },
            48: { desc: 'Nebbia di brina', icon: '🌫️' },
            51: { desc: 'Pioviggine leggera', icon: '🌧️' },
            53: { desc: 'Pioviggine moderata', icon: '🌧️' },
            55: { desc: 'Pioviggine fitta', icon: '🌧️' },
            56: { desc: 'Pioviggine gelata', icon: '🌧️' },
            57: { desc: 'Pioviggine gelata fitta', icon: '🌧️' },
            61: { desc: 'Pioggia debole', icon: '🌧️' },
            63: { desc: 'Pioggia moderata', icon: '🌧️' },
            65: { desc: 'Pioggia forte', icon: '🌧️' },
            66: { desc: 'Pioggia gelata debole', icon: '🌧️' },
            67: { desc: 'Pioggia gelata forte', icon: '🌧️' },
            71: { desc: 'Neve debole', icon: '🌨️' },
            73: { desc: 'Neve moderata', icon: '🌨️' },
            75: { desc: 'Neve forte', icon: '🌨️' },
            77: { desc: 'Granelli di neve', icon: '🌨️' },
            80: { desc: 'Rovesci deboli', icon: '🌦️' },
            81: { desc: 'Rovesci moderati', icon: '🌧️' },
            82: { desc: 'Rovesci violenti', icon: '⛈️' },
            85: { desc: 'Rovesci di neve deboli', icon: '🌨️' },
            86: { desc: 'Rovesci di neve forti', icon: '🌨️' },
            95: { desc: 'Temporale', icon: '🌩️' },
            96: { desc: 'Temporale con grandine', icon: '⛈️' },
            99: { desc: 'Temporale forte con grandine', icon: '⛈️' }
        };

        const daysOfWeek = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
        const months = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Gio', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];

        function getWeatherInfo(code) {
            return weatherCodes[code] || { desc: 'Sconosciuto', icon: '❓' };
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${daysOfWeek[date.getDay()]}, ${date.getDate()} ${months[date.getMonth()]}`;
        }

        // --- Elementi DOM ---
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('errorMessage');
        const contentArea = document.getElementById('contentArea');

        // --- Gestione Ricerca ---
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(searchTimeout);

            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            searchTimeout = setTimeout(() => {
                fetchCities(query);
            }, 500);
        });

        // Nascondi risultati cliccando fuori
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.style.display = 'none';
            }
        });

        async function fetchCities(query) {
            try {
                const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=it&format=json`);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    renderSearchResults(data.results);
                } else {
                    searchResults.innerHTML = '<div class="search-result-item"><span class="search-result-city">Nessuna città trovata</span></div>';
                    searchResults.style.display = 'block';
                }
            } catch (error) {
                console.error("Errore nella ricerca città:", error);
            }
        }

        function renderSearchResults(results) {
            searchResults.innerHTML = '';
            results.forEach(city => {
                const div = document.createElement('div');
                div.className = 'search-result-item';

                const adminInfo = [city.admin1, city.country].filter(Boolean).join(', ');

                div.innerHTML = `
                    <span class="search-result-city">${city.name}</span>
                    <span class="search-result-admin">${adminInfo}</span>
                `;

                div.addEventListener('click', () => {
                    searchInput.value = city.name;
                    searchResults.style.display = 'none';
                    fetchWeather(city.latitude, city.longitude, city.name);
                });

                searchResults.appendChild(div);
            });
            searchResults.style.display = 'block';
        }

        // --- Gestione Meteo ---
        function showLoader() {
            loader.style.display = 'flex';
            contentArea.style.display = 'none';
            errorMessage.style.display = 'none';
        }

        function showError(msg) {
            loader.style.display = 'none';
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }

        function showContent() {
            loader.style.display = 'none';
            errorMessage.style.display = 'none';
            contentArea.style.display = 'flex';
        }

        async function fetchWeather(lat, lon, cityName) {
            showLoader();
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Errore nel recupero dati meteo");

                const data = await response.json();
                renderWeather(data, cityName);
                showContent();
            } catch (error) {
                console.error(error);
                showError("Impossibile caricare i dati meteo. Riprova più tardi.");
            }
        }

        function renderWeather(data, cityName) {
            // Dati Attuali
            const current = data.current;
            const weatherInfo = getWeatherInfo(current.weather_code);

            document.getElementById('cityName').textContent = cityName;
            document.getElementById('dateInfo').textContent = formatDate(current.time);
            document.getElementById('mainIcon').textContent = weatherInfo.icon;
            document.getElementById('currentTemp').textContent = `${Math.round(current.temperature_2m)}°`;
            document.getElementById('weatherDesc').textContent = weatherInfo.desc;

            document.getElementById('feelsLike').textContent = `${Math.round(current.apparent_temperature)}°`;
            document.getElementById('windSpeed').textContent = `${Math.round(current.wind_speed_10m)} km/h`;
            document.getElementById('humidity').textContent = `${current.relative_humidity_2m}%`;

            // Previsioni Orarie (Prossime 24h)
            const hourlyContainer = document.getElementById('hourlyForecast');
            hourlyContainer.innerHTML = '';

            const now = new Date();
            // Trova l'indice dell'ora corrente o successiva
            let startIndex = 0;
            for (let i = 0; i < data.hourly.time.length; i++) {
                if (new Date(data.hourly.time[i]) >= now) {
                    startIndex = i;
                    break;
                }
            }

            for (let i = startIndex; i < startIndex + 24 && i < data.hourly.time.length; i++) {
                const time = new Date(data.hourly.time[i]);
                const temp = Math.round(data.hourly.temperature_2m[i]);
                const codeInfo = getWeatherInfo(data.hourly.weather_code[i]);

                const hourStr = i === startIndex ? 'Ora' : `${time.getHours().toString().padStart(2, '0')}:00`;

                const item = document.createElement('div');
                item.className = 'hourly-item';
                item.innerHTML = `
                    <div class="hourly-time">${hourStr}</div>
                    <div class="hourly-icon">${codeInfo.icon}</div>
                    <div class="hourly-temp">${temp}°</div>
                `;
                hourlyContainer.appendChild(item);
            }

            // Previsioni Giornaliere (7 giorni)
            const dailyContainer = document.getElementById('dailyForecast');
            dailyContainer.innerHTML = '';

            for (let i = 0; i < data.daily.time.length; i++) {
                const date = new Date(data.daily.time[i]);
                const isToday = i === 0;
                const dayName = isToday ? 'Oggi' : daysOfWeek[date.getDay()];

                const codeInfo = getWeatherInfo(data.daily.weather_code[i]);
                const tempMax = Math.round(data.daily.temperature_2m_max[i]);
                const tempMin = Math.round(data.daily.temperature_2m_min[i]);

                const item = document.createElement('div');
                item.className = 'daily-item';
                item.innerHTML = `
                    <div class="daily-day">${dayName}</div>
                    <div class="daily-icon-container">
                        <span class="daily-icon">${codeInfo.icon}</span>
                    </div>
                    <div class="daily-temps">
                        <span class="temp-min">${tempMin}°</span>
                        <span class="temp-max">${tempMax}°</span>
                    </div>
                `;
                dailyContainer.appendChild(item);
            }
        }

        // --- Avvio ---
        function initApp() {
            showLoader();

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;

                        // Cerca di ottenere il nome della città dalle coordinate (Reverse Geocoding)
                        // L'API di Open-Meteo per il reverse geocoding non è diretta,
                        // ma possiamo usare un'API gratuita alternativa o un fallback.
                        // Usiamo una chiamata fetch generica a nominatim (limitata, ma utile) o
                        // un nome generico se fallisce.

                        let cityName = "Posizione Attuale";
                        try {
                            // Reverse geocoding con Nominatim OSM (richiede User-Agent, ma funziona da browser)
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`);
                            if(res.ok) {
                                const geoData = await res.json();
                                cityName = geoData.address.city || geoData.address.town || geoData.address.village || geoData.address.county || "Posizione Attuale";
                            }
                        } catch(e) {
                            console.log("Reverse geocoding fallito, uso default");
                        }

                        fetchWeather(lat, lon, cityName);
                    },
                    (error) => {
                        console.warn("Geolocalizzazione fallita/negata:", error);
                        showError("Impossibile ottenere la posizione. Cerca una città tramite la barra di ricerca in alto.");
                    },
                    { timeout: 10000 }
                );
            } else {
                showError("La geolocalizzazione non è supportata dal tuo browser. Cerca una città manualmente.");
            }
        }

        // Avvia l'app
        initApp();
    </script>
</body>
</html>
